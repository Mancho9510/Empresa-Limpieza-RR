<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpieza RR – Diagnóstico</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS procesado por Vite -->
  <link rel="stylesheet" href="/input.css">

  <style>
    /* Estilos mínimos inline para confirmar que el HTML carga */
    body { font-family: 'Outfit', sans-serif; background: #F0FDF9; color: #0F172A; margin: 0; }
    .diag { max-width: 600px; margin: 60px auto; padding: 32px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(13,148,136,.1); border: 1.5px solid #99F6E4; }
    .diag h1 { font-family: 'Syne', sans-serif; color: #0D9488; margin-bottom: 8px; }
    .diag p  { color: #64748B; font-size: .95rem; line-height: 1.6; margin-bottom: 12px; }
    .status  { padding: 10px 14px; border-radius: 10px; font-size: .85rem; margin-bottom: 8px; }
    .ok      { background: #DCFCE7; color: #166534; }
    .loading { background: #FEF9C3; color: #854D0E; }
    .error   { background: #FEE2E2; color: #991B1B; }
  </style>
</head>
<body>

<div class="diag">
  <h1>🧴 Limpieza RR — Diagnóstico</h1>
  <p>Esta página verifica que cada capa del proyecto funciona correctamente.</p>

  <div class="status ok">✅ HTML carga correctamente</div>
  <div class="status ok">✅ CSS inline funciona</div>
  <div id="statusCSS"    class="status loading">⏳ Verificando CSS externo (input.css)...</div>
  <div id="statusModules" class="status loading">⏳ Verificando módulos JS...</div>
  <div id="statusAPI"    class="status loading">⏳ Verificando conexión con Apps Script...</div>

  <p id="resultado" style="margin-top:20px; font-weight:600;"></p>
</div>

<script type="module">
  // Test 1: ¿Carga el módulo config.js?
  try {
    const { APPS_URL } = await import('/js/admin/config.js')
    document.getElementById('statusModules').className = 'status ok'
    document.getElementById('statusModules').textContent = '✅ Módulos JS cargan correctamente'

    // Test 2: ¿Responde el Apps Script?
    try {
      const url = `${APPS_URL}?action=productos&t=${Date.now()}`
      const res = await fetch(url)
      if (res.ok) {
        const json = await res.json()
        if (json.ok && json.data) {
          document.getElementById('statusAPI').className = 'status ok'
          document.getElementById('statusAPI').textContent = `✅ Apps Script responde — ${json.data.length} productos`
          document.getElementById('resultado').textContent = '🎉 Todo funciona. El problema es solo el CSS o el HTML principal.'
          document.getElementById('resultado').style.color = '#166534'
        }
      }
    } catch(e) {
      document.getElementById('statusAPI').className = 'status error'
      document.getElementById('statusAPI').textContent = '❌ Apps Script no responde: ' + e.message
    }

  } catch(e) {
    document.getElementById('statusModules').className = 'status error'
    document.getElementById('statusModules').textContent = '❌ Error en módulos JS: ' + e.message
    document.getElementById('resultado').textContent = 'El problema está en los imports de JS. Ver detalle arriba.'
    document.getElementById('resultado').style.color = '#991B1B'
  }

  // Test 3: ¿Cargó el CSS externo? (verifica si una variable CSS existe)
  setTimeout(() => {
    const color = getComputedStyle(document.body).getPropertyValue('--teal').trim()
    const cssStatus = document.getElementById('statusCSS')
    if (color) {
      cssStatus.className = 'status ok'
      cssStatus.textContent = `✅ CSS carga correctamente (--teal = ${color})`
    } else {
      cssStatus.className = 'status error'
      cssStatus.textContent = '❌ CSS externo no cargó — las variables CSS no están disponibles'
    }
  }, 500)
</script>

</body>
</html>
